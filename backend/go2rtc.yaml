api:
  listen: :1984

rtsp:
  listen: :8554

log:
  level: info

ffmpeg:
  bin: ${FFMPEG_BIN:ffmpeg}

# Стримы НЕ прописываются здесь статически — go2rtc моментально начинает
# тянуть источник и буферизировать в памяти даже без клиентов.
# Бэкенд регистрирует стрим через PUT /api/streams только когда пользователь
# открывает камеру (on-demand через ensureStream).
streams:
  device_47_ch1_main:
    - ffmpeg:rtsp://admin:QWERTY123456.@192.168.10.96:554/unicast/c1/s0/live#video=copy#audio=aac
