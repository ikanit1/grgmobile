<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doorphone — панель управления</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Unbounded:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Toast ── */
    #toastContainer {
      position: fixed; top: 1rem; right: 1rem; z-index: 9999;
      display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none;
    }
    .toast {
      padding: 0.625rem 1rem; border-radius: var(--grg-r-sm);
      font-size: 13px; font-weight: 500; max-width: 360px;
      animation: toastIn 0.2s ease; pointer-events: auto;
      backdrop-filter: blur(12px);
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    .toast.ok   { background:rgba(61,213,152,0.18); border:1px solid rgba(61,213,152,0.35); color:var(--grg-success); }
    .toast.err  { background:rgba(255,107,107,0.18); border:1px solid rgba(255,107,107,0.35); color:var(--grg-danger); }
    .toast.warn { background:rgba(246,195,68,0.18); border:1px solid rgba(246,195,68,0.35); color:var(--grg-warning); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: rgba(14,6,26,0.97); border: 1px solid var(--grg-glass-border);
      border-radius: var(--grg-r-lg); padding: 1.5rem;
      min-width: 320px; max-width: 480px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal-title { font-family: var(--grg-font-display); font-size: 1rem; color: #fff; }
    .modal-body  { font-size: 13px; color: var(--grg-ink-200); line-height: 1.5; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    body {
      font-family: var(--grg-font-sans);
      color: var(--grg-ink-100);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Typography ── */
    h1, h2, h3 { font-family: var(--grg-font-display); font-weight: 600; }
    code, .badge, .meta-code, pre { font-family: var(--grg-font-mono); }
    a { color: var(--grg-purple-300); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Login overlay (pre-auth) ── */
    .login-overlay {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 1rem;
    }
    .login-overlay .login-box {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-brand h1 {
      font-size: 1.25rem;
      color: var(--grg-purple-300);
      letter-spacing: 0.02em;
    }
    .login-brand .sub {
      font-size: 12px;
      color: var(--grg-ink-300);
      margin-top: 4px;
    }

    /* ── App shell (post-auth) ── */
    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 224px;
      flex-shrink: 0;
      background: rgba(10, 4, 24, 0.70);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-right: 1px solid var(--grg-glass-border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-brand {
      padding: 1.25rem 1rem 1rem;
      border-bottom: 1px solid var(--grg-glass-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-logo {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(138,43,226,.4), 0 6px 18px -6px rgba(138,43,226,.6);
    }
    .sidebar-brand .brand-name {
      display: block;
      font-family: var(--grg-font-display);
      font-size: 0.875rem;
      color: #fff;
      letter-spacing: 0.01em;
    }
    .sidebar-brand .brand-sub {
      display: block;
      font-size: 10px;
      color: var(--grg-ink-400);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .sidebar-nav {
      flex: 1;
      padding: 0.5rem 0.625rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: none;
      border-radius: 9px;
      color: var(--grg-ink-200);
      font-family: var(--grg-font-sans);
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background var(--grg-dur-fast) var(--grg-ease), color var(--grg-dur-fast) var(--grg-ease);
    }
    .sidebar-nav-item:hover {
      background: rgba(138, 43, 226, 0.10);
      color: #fff;
    }
    .sidebar-nav-item.active {
      background: rgba(138, 43, 226, 0.20);
      color: #fff;
    }
    .nav-dot {
      width: 6px; height: 6px; border-radius: 99px;
      background: var(--grg-ink-700); flex-shrink: 0;
      transition: background var(--grg-dur-fast), box-shadow var(--grg-dur-fast);
    }
    .sidebar-nav-item.active .nav-dot {
      background: var(--grg-purple-500);
      box-shadow: 0 0 6px var(--grg-purple-500);
    }
    .nav-icon {
      font-size: 13px;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .sidebar-footer {
      padding: 1rem 1rem;
      border-top: 1px solid var(--grg-glass-border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .sidebar-footer .user-role {
      font-size: 11px;
      color: var(--grg-ink-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .sidebar-footer .sidebar-link {
      font-size: 12px;
      color: var(--grg-ink-300);
    }
    .sidebar-footer .sidebar-link:hover { color: var(--grg-ink-100); }

    /* ── Main area ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.5rem;
      border-bottom: 1px solid var(--grg-glass-border);
      gap: 1rem;
      flex-shrink: 0;
    }
    .main-header .page-title {
      font-family: var(--grg-font-mono);
      font-size: 0.75rem;
      color: var(--grg-ink-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .header-actions { display: flex; align-items: center; gap: 0.75rem; }
    .content-area {
      padding: 1.5rem;
      flex: 1;
      overflow-y: auto;
    }

    /* ── Cards ── */
    .card {
      background: var(--grg-glass-base);
      border: 1px solid var(--grg-glass-border);
      border-radius: var(--grg-r-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      backdrop-filter: blur(var(--grg-blur-md)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--grg-blur-md)) saturate(140%);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute;
      top: 0; left: 16px; right: 16px; height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }
    .card h2 {
      font-family: var(--grg-font-mono);
      font-size: 0.75rem;
      margin: 0 0 1rem 0;
      color: var(--grg-ink-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Forms ── */
    form { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 12px;
      color: var(--grg-ink-300);
      font-weight: 500;
    }
    label { font-size: 13px; color: var(--grg-ink-300); }
    input, select, textarea {
      background: rgba(14, 6, 26, 0.80);
      border: 1px solid var(--grg-glass-border);
      color: var(--grg-ink-100);
      padding: 0.5rem 0.75rem;
      border-radius: var(--grg-r-sm);
      font-family: var(--grg-font-sans);
      font-size: 13px;
      transition: border-color var(--grg-dur-fast), box-shadow var(--grg-dur-fast);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--grg-purple-500);
      box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.18);
    }
    input::placeholder { color: var(--grg-ink-400); }
    select option { background: var(--grg-ink-800); }

    /* ── Buttons ── */
    button {
      background: linear-gradient(135deg, var(--grg-purple-500), var(--grg-purple-600));
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: var(--grg-r-sm);
      font-family: var(--grg-font-sans);
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 4px 14px -4px rgba(138, 43, 226, 0.60);
      transition: box-shadow var(--grg-dur-fast) var(--grg-ease),
                  background var(--grg-dur-fast) var(--grg-ease);
      white-space: nowrap;
    }
    button:hover {
      background: linear-gradient(135deg, var(--grg-purple-600), var(--grg-purple-700));
      box-shadow: 0 6px 20px -4px rgba(138, 43, 226, 0.75);
    }
    button.secondary {
      background: transparent;
      border: 1px solid var(--grg-glass-border);
      color: var(--grg-ink-300);
      box-shadow: none;
    }
    button.secondary:hover { color: #fff; border-color: var(--grg-purple-500); }
    button.danger {
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: var(--grg-danger);
      box-shadow: none;
    }
    button.danger:hover { background: rgba(255, 107, 107, 0.25); }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--grg-glass-border);
      color: var(--grg-ink-300);
      box-shadow: none;
      padding: 0.4rem 0.875rem;
      font-size: 12px;
      width: 100%;
    }
    .logout-btn:hover { color: var(--grg-danger); border-color: var(--grg-danger); background: rgba(255,107,107,0.08); }

    /* ── Messages ── */
    .msg { margin-top: 0.75rem; padding: 0.5rem 0.75rem; border-radius: var(--grg-r-sm); font-size: 13px; }
    .msg.err { background: rgba(255, 107, 107, 0.12); color: var(--grg-danger); border: 1px solid rgba(255,107,107,0.25); }
    .msg.ok  { background: rgba(61, 213, 152, 0.12); color: var(--grg-success); border: 1px solid rgba(61,213,152,0.25); }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--grg-glass-border); }
    th { color: var(--grg-ink-300); font-family: var(--grg-font-mono); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    tr:hover td { background: rgba(138, 43, 226, 0.06); }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: var(--grg-r-sm);
      background: rgba(138, 43, 226, 0.15);
      border: 1px solid var(--grg-glass-border);
      color: var(--grg-purple-300);
      font-size: 11px;
      font-family: var(--grg-font-mono);
    }

    /* ── Meta ── */
    .meta { color: var(--grg-ink-300); font-size: 12px; margin-top: 0.5rem; }

    /* ── Health status ── */
    #health { font-size: 13px; color: var(--grg-ink-100); }

    /* ── Utilities ── */
    #userInfo { font-size: 12px; color: var(--grg-ink-300); }

    /* ── Dashboard stat cards (T14/T17) ── */
    .stat-cards { list-style:none; padding:0; display:flex; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
    .stat-card { min-width:160px; padding:0.75rem 1rem; background:var(--grg-bg-card); border:1px solid var(--grg-glass-border); border-radius:8px; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
    .stat-card:hover { border-color:var(--grg-purple-500); box-shadow:0 0 0 2px rgba(138,43,226,.15); }
    .stat-label { font-size:11px; color:var(--grg-ink-300); text-transform:uppercase; letter-spacing:.06em; }
    .stat-value { font-size:1.5rem; font-weight:700; color:var(--grg-purple-300); margin-top:4px; }

    /* ── Scan channel panel (T17) ── */
    .scan-ch-panel { margin:8px 0; border:1px solid var(--grg-glass-border); border-radius:8px; overflow:hidden; }
    .scan-result-header { padding:10px 14px; background:rgba(138,43,226,.25); font-size:11px; font-weight:600; color:#fff; }
    .scan-result-row { display:flex; align-items:center; gap:12px; padding:7px 14px; border-top:1px solid var(--grg-glass-border); font-size:12px; }
  </style>
</head>
<body class="grg-bg">

  <!-- ══ PRE-AUTH: login overlay ══ -->
  <div id="loginContainer" class="login-overlay">
    <div class="login-box">
      <div class="login-brand">
        <h1>Doorphone</h1>
        <p class="sub">Панель управления</p>
      </div>

      <div class="card">
        <h2>Состояние сервера</h2>
        <div id="health">Загрузка…</div>
        <div class="meta">GET /api/health</div>
      </div>

      <div class="card" id="authSection">
        <h2>Вход</h2>
        <form id="loginForm" style="flex-direction:column; align-items:stretch;">
          <div class="field">
            <label for="login">Логин (email или телефон)</label>
            <input type="text" id="login" name="login" placeholder="admin@example.com" required autocomplete="username">
          </div>
          <div class="field">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="••••••" required autocomplete="current-password">
          </div>
          <button type="submit" style="margin-top:0.25rem;">Войти</button>
        </form>
        <div id="loginMsg" class="msg" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ══ POST-AUTH: sidebar shell ══ -->
  <div id="appShell" class="app-shell" style="display:none;">

    <aside class="sidebar">
      <div class="sidebar-brand">
        <img class="brand-logo" src="/work.png" alt="GRG">
        <div>
          <span class="brand-name">Doorphone</span>
          <span class="brand-sub">Admin</span>
        </div>
      </div>

      <!-- Tab nav rendered by buildTabsByRole() -->
      <nav id="tabBar" class="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <span class="user-role" id="userInfo"></span>
        <a href="/docs" target="_blank" class="sidebar-link">Swagger API</a>
        <a href="/api/docs/TUTORIAL.md" target="_blank" class="sidebar-link">📖 Туториал</a>
        <button type="button" id="logoutBtn" class="logout-btn">Выйти</button>
      </div>
    </aside>

    <div class="main-area">
      <header class="main-header">
        <span class="page-title" id="pageTitle">Панель управления</span>
        <div class="header-actions">
          <span id="roleHint" class="meta"></span>
        </div>
      </header>

      <div class="content-area" id="dataSection">
        <div id="dataContent">Выберите раздел</div>

        <div id="createSection" class="card" style="margin-top:1rem; display:none;">
          <h2 id="createSectionTitle">Создать</h2>
          <div id="createFormContainer"></div>
          <div id="createMsg" class="msg" style="display:none;"></div>
        </div>


        <section id="residentSection" class="card" style="margin-top:1rem; display:none;">
          <h2>Жители квартиры</h2>
          <p class="meta">Квартира: <span id="residentApartmentName">—</span></p>
          <div id="residentsList" style="margin-top:0.75rem;">Загрузка…</div>
          <form id="addResidentForm" style="margin-top:1rem;">
            <label for="resUserId">ID пользователя (или оставьте пустым)</label>
            <input type="text" id="resUserId" placeholder="UUID или пусто" style="width:200px;">
            <input type="text" id="resEmail" placeholder="Email">
            <input type="text" id="resPhone" placeholder="Телефон">
            <input type="text" id="resRole" placeholder="роль: owner/resident/guest" value="resident" style="width:140px;">
            <button type="submit">Добавить жителя</button>
          </form>
          <div id="addResidentMsg" class="msg" style="display:none;"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>
  <script src="/admin.js" defer></script>
</body>
</html>
