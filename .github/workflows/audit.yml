name: Audit Repository Changes

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Handle case of initial push (no parent commit)
          if git rev-parse "$BASE" >/dev/null 2>&1; then
            git diff --name-only "$BASE" "$HEAD" > /tmp/changed_files.txt
          else
            git diff-tree --no-commit-id -r --name-only "$HEAD" > /tmp/changed_files.txt
          fi

          echo "=== Changed files ==="
          cat /tmp/changed_files.txt

          HAS_BACKEND=false
          HAS_FLUTTER=false
          HAS_STREAMING=false

          if grep -q "^backend/" /tmp/changed_files.txt; then HAS_BACKEND=true; fi
          if grep -qE "^(lib/|pubspec\.yaml|android/|ios/)" /tmp/changed_files.txt; then HAS_FLUTTER=true; fi
          if grep -qiE "(go2rtc|stream|rtsp|hls|webrtc)" /tmp/changed_files.txt; then HAS_STREAMING=true; fi

          echo "has_backend=$HAS_BACKEND" >> $GITHUB_OUTPUT
          echo "has_flutter=$HAS_FLUTTER" >> $GITHUB_OUTPUT
          echo "has_streaming=$HAS_STREAMING" >> $GITHUB_OUTPUT

      # ── BACKEND AUDIT ────────────────────────────────────────────────────────
      - name: Setup Node.js
        if: steps.changes.outputs.has_backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        if: steps.changes.outputs.has_backend == 'true'
        working-directory: backend
        run: npm ci --prefer-offline

      - name: TypeScript compilation check
        if: steps.changes.outputs.has_backend == 'true'
        id: ts-check
        working-directory: backend
        run: |
          npx tsc --noEmit 2>&1 | tee /tmp/ts_errors.txt
          TS_EXIT=${PIPESTATUS[0]}
          TS_ERROR_COUNT=$(grep -c "error TS" /tmp/ts_errors.txt || true)
          echo "ts_errors=$TS_ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "ts_exit=$TS_EXIT" >> $GITHUB_OUTPUT

      - name: Check for migration files
        if: steps.changes.outputs.has_backend == 'true'
        id: migrations
        run: |
          MIGRATION_FILES=$(grep "^backend/" /tmp/changed_files.txt | grep -iE "(migrat|schema|entity)" || true)
          ENTITY_FILES=$(grep "^backend/src" /tmp/changed_files.txt | grep "\.entity\.ts$" || true)
          SQL_FILES=$(grep "^backend/" /tmp/changed_files.txt | grep "\.sql$" || true)

          MIGRATION_STATUS="OK"
          MIGRATION_NOTES=""

          if [ -n "$ENTITY_FILES" ] && [ -z "$SQL_FILES" ]; then
            MIGRATION_STATUS="WARNING"
            MIGRATION_NOTES="Entity files changed without corresponding SQL migration"
          fi

          echo "migration_status=$MIGRATION_STATUS" >> $GITHUB_OUTPUT
          echo "migration_notes=$MIGRATION_NOTES" >> $GITHUB_OUTPUT
          echo "entity_files<<EOF" >> $GITHUB_OUTPUT
          echo "$ENTITY_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check module imports consistency
        if: steps.changes.outputs.has_backend == 'true'
        id: modules
        run: |
          ISSUES=""
          # Check each changed service has its module imported
          CHANGED_SERVICES=$(grep "^backend/src/" /tmp/changed_files.txt | grep "\.service\.ts$" || true)
          for svc in $CHANGED_SERVICES; do
            SVC_NAME=$(basename "$svc" .service.ts)
            MODULE_NAME="${SVC_NAME}.module.ts"
            if ! grep -r "$MODULE_NAME\|${SVC_NAME^}Module" backend/src/app.module.ts >/dev/null 2>&1; then
              ISSUES="$ISSUES\n- Possible missing module import for: $SVC_NAME"
            fi
          done
          echo "module_issues<<EOF" >> $GITHUB_OUTPUT
          printf "%b" "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check security patterns
        if: steps.changes.outputs.has_backend == 'true'
        id: security
        run: |
          ISSUES=""
          CHANGED_BACKEND=$(grep "^backend/src/" /tmp/changed_files.txt || true)

          for f in $CHANGED_BACKEND; do
            [ -f "$f" ] || continue
            # Raw credential exposure
            if grep -nE "(password|token|secret)\s*=\s*['\"][^'\"]{6,}" "$f" 2>/dev/null | grep -qv "example\|test\|placeholder"; then
              ISSUES="$ISSUES\n- Possible hardcoded secret in $f"
            fi
            # SQL injection risk (raw query without parameterization)
            if grep -nE "query\(['\"\`][^)]*\\\$\{" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n- Possible unsafe raw SQL in $f"
            fi
            # Missing @UseGuards on controller
            if grep -q "@Controller" "$f" && ! grep -q "@UseGuards\|@Public" "$f" 2>/dev/null; then
              ISSUES="$ISSUES\n- Controller may be missing auth guard: $f"
            fi
          done
          echo "security_issues<<EOF" >> $GITHUB_OUTPUT
          printf "%b" "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── FLUTTER AUDIT ────────────────────────────────────────────────────────
      - name: Setup Flutter
        if: steps.changes.outputs.has_flutter == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: Flutter pub get
        if: steps.changes.outputs.has_flutter == 'true'
        run: flutter pub get

      - name: Flutter analyze
        if: steps.changes.outputs.has_flutter == 'true'
        id: flutter-analyze
        run: |
          flutter analyze 2>&1 | tee /tmp/flutter_analyze.txt
          FLUTTER_EXIT=${PIPESTATUS[0]}
          FLUTTER_ERRORS=$(grep -c "error •" /tmp/flutter_analyze.txt || true)
          FLUTTER_WARNINGS=$(grep -c "warning •" /tmp/flutter_analyze.txt || true)
          echo "flutter_errors=$FLUTTER_ERRORS" >> $GITHUB_OUTPUT
          echo "flutter_warnings=$FLUTTER_WARNINGS" >> $GITHUB_OUTPUT
          echo "flutter_exit=$FLUTTER_EXIT" >> $GITHUB_OUTPUT

      - name: Check Flutter structure compliance
        if: steps.changes.outputs.has_flutter == 'true'
        id: flutter-structure
        run: |
          ISSUES=""
          CHANGED_DART=$(grep "^lib/" /tmp/changed_files.txt | grep "\.dart$" || true)

          for f in $CHANGED_DART; do
            [ -f "$f" ] || continue
            # Screens should use BackendClient, not raw http
            if echo "$f" | grep -q "^lib/screens/"; then
              if grep -q "import 'package:http/" "$f" && ! grep -q "backend_client" "$f"; then
                ISSUES="$ISSUES\n- Screen uses raw http instead of BackendClient: $f"
              fi
            fi
            # Check hardcoded API URLs
            if grep -nE "http://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+" "$f" 2>/dev/null | grep -qv "test\|example"; then
              ISSUES="$ISSUES\n- Possible hardcoded IP/URL in $f"
            fi
          done
          echo "flutter_structure_issues<<EOF" >> $GITHUB_OUTPUT
          printf "%b" "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── STREAMING AUDIT ──────────────────────────────────────────────────────
      - name: Check go2rtc/streaming endpoints
        if: steps.changes.outputs.has_streaming == 'true'
        id: streaming
        run: |
          ISSUES=""
          STREAMING_FILES=$(grep -iE "(go2rtc|stream|rtsp|hls|webrtc)" /tmp/changed_files.txt || true)

          for f in $STREAMING_FILES; do
            [ -f "$f" ] || continue
            # Check error handling in streaming endpoints
            if echo "$f" | grep -qE "\.(ts|dart)$"; then
              if grep -qiE "(rtsp|hls|stream)" "$f"; then
                if ! grep -qE "(try|catch|onError|error\s*=>" "$f"; then
                  ISSUES="$ISSUES\n- Missing error handling in streaming file: $f"
                fi
                # Check timeout handling
                if ! grep -qiE "(timeout|TimeoutException|connectTimeout)" "$f"; then
                  ISSUES="$ISSUES\n- No timeout configured for streaming in: $f"
                fi
              fi
            fi
          done
          echo "streaming_issues<<EOF" >> $GITHUB_OUTPUT
          printf "%b" "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── BUILD REPORT & SEND ──────────────────────────────────────────────────
      - name: Compose and send Telegram report
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HAS_BACKEND: ${{ steps.changes.outputs.has_backend }}
          HAS_FLUTTER: ${{ steps.changes.outputs.has_flutter }}
          HAS_STREAMING: ${{ steps.changes.outputs.has_streaming }}
          TS_ERRORS: ${{ steps.ts-check.outputs.ts_errors }}
          TS_EXIT: ${{ steps.ts-check.outputs.ts_exit }}
          MIGRATION_STATUS: ${{ steps.migrations.outputs.migration_status }}
          MIGRATION_NOTES: ${{ steps.migrations.outputs.migration_notes }}
          ENTITY_FILES: ${{ steps.migrations.outputs.entity_files }}
          MODULE_ISSUES: ${{ steps.modules.outputs.module_issues }}
          SECURITY_ISSUES: ${{ steps.security.outputs.security_issues }}
          FLUTTER_ERRORS: ${{ steps.flutter-analyze.outputs.flutter_errors }}
          FLUTTER_WARNINGS: ${{ steps.flutter-analyze.outputs.flutter_warnings }}
          FLUTTER_EXIT: ${{ steps.flutter-analyze.outputs.flutter_exit }}
          FLUTTER_STRUCT_ISSUES: ${{ steps.flutter-structure.outputs.flutter_structure_issues }}
          STREAMING_ISSUES: ${{ steps.streaming.outputs.streaming_issues }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_URL="https://github.com/$REPO/commit/$COMMIT_SHA"

          # Header
          if [ "$EVENT_NAME" = "pull_request" ]; then
            HEADER="🔀 *Pull Request:* $PR_TITLE"
          else
            HEADER="📦 *Push* → \`$BRANCH\`"
          fi

          REPORT="$HEADER
          👤 Автор: \`$ACTOR\`
          🔗 Коммит: [$SHORT_SHA]($COMMIT_URL)
          ━━━━━━━━━━━━━━━━━━━━"

          # Changed areas
          AREAS=""
          [ "$HAS_BACKEND" = "true" ] && AREAS="$AREAS ⚙️Backend"
          [ "$HAS_FLUTTER" = "true" ] && AREAS="$AREAS 📱Flutter"
          [ "$HAS_STREAMING" = "true" ] && AREAS="$AREAS 📹Streaming"
          [ -z "$AREAS" ] && AREAS=" (прочие файлы)"
          REPORT="$REPORT
          📂 *Изменены:*$AREAS"

          # Backend section
          if [ "$HAS_BACKEND" = "true" ]; then
            REPORT="$REPORT
          ━━━━━━━━━━━━━━━━━━━━
          ⚙️ *BACKEND АУДИТ*"

            # TypeScript
            if [ -n "$TS_EXIT" ]; then
              if [ "$TS_EXIT" = "0" ]; then
                REPORT="$REPORT
          ✅ TypeScript: ошибок нет"
              else
                REPORT="$REPORT
          ❌ TypeScript: $TS_ERRORS ошибок компиляции"
              fi
            fi

            # Migrations
            if [ "$MIGRATION_STATUS" = "WARNING" ]; then
              REPORT="$REPORT
          ⚠️ Миграции: $MIGRATION_NOTES"
              if [ -n "$ENTITY_FILES" ]; then
                REPORT="$REPORT
          📝 Entity-файлы: $ENTITY_FILES"
              fi
            else
              REPORT="$REPORT
          ✅ Миграции: схема в порядке"
            fi

            # Module issues
            if [ -n "$MODULE_ISSUES" ]; then
              REPORT="$REPORT
          ⚠️ Модули:$MODULE_ISSUES"
            else
              REPORT="$REPORT
          ✅ Модули: импорты корректны"
            fi

            # Security
            if [ -n "$SECURITY_ISSUES" ]; then
              REPORT="$REPORT
          🔴 Безопасность:$SECURITY_ISSUES"
            else
              REPORT="$REPORT
          ✅ Безопасность: критических паттернов нет"
            fi
          fi

          # Flutter section
          if [ "$HAS_FLUTTER" = "true" ]; then
            REPORT="$REPORT
          ━━━━━━━━━━━━━━━━━━━━
          📱 *FLUTTER АУДИТ*"

            if [ -n "$FLUTTER_EXIT" ]; then
              if [ "$FLUTTER_EXIT" = "0" ]; then
                REPORT="$REPORT
          ✅ Анализ: $FLUTTER_WARNINGS предупр., ошибок нет"
              else
                REPORT="$REPORT
          ❌ Анализ: $FLUTTER_ERRORS ошибок, $FLUTTER_WARNINGS предупр."
              fi
            fi

            if [ -n "$FLUTTER_STRUCT_ISSUES" ]; then
              REPORT="$REPORT
          ⚠️ Структура:$FLUTTER_STRUCT_ISSUES"
            else
              REPORT="$REPORT
          ✅ Структура: соответствует архитектуре"
            fi
          fi

          # Streaming section
          if [ "$HAS_STREAMING" = "true" ]; then
            REPORT="$REPORT
          ━━━━━━━━━━━━━━━━━━━━
          📹 *STREAMING АУДИТ*"

            if [ -n "$STREAMING_ISSUES" ]; then
              REPORT="$REPORT
          ⚠️ Проблемы:$STREAMING_ISSUES"
            else
              REPORT="$REPORT
          ✅ Обработка ошибок и таймауты: OK"
            fi
          fi

          # Overall verdict
          CRITICAL=false
          [ "$TS_EXIT" != "0" ] && [ -n "$TS_EXIT" ] && CRITICAL=true
          [ "$FLUTTER_EXIT" != "0" ] && [ -n "$FLUTTER_EXIT" ] && CRITICAL=true
          [ -n "$SECURITY_ISSUES" ] && CRITICAL=true

          REPORT="$REPORT
          ━━━━━━━━━━━━━━━━━━━━"
          if [ "$CRITICAL" = "true" ]; then
            REPORT="$REPORT
          🔴 *ВЕРДИКТ: КРИТИЧЕСКИЕ ПРОБЛЕМЫ* — требует внимания"
          else
            REPORT="$REPORT
          🟢 *ВЕРДИКТ: OK* — изменения соответствуют архитектуре"
          fi

          # Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$REPORT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}')" \
            | jq -r 'if .ok then "Telegram: report sent" else "Telegram error: \(.description)" end'
