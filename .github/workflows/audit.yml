name: Repository Audit

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  audit:
    name: Audit & Telegram Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve SHAs
        id: shas
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}"                         >> "$GITHUB_OUTPUT"
          else
            # For the very first commit fall back to empty-tree SHA
            PARENT=$(git rev-parse HEAD~1 2>/dev/null || echo "4b825dc642cb6eb9a060e54bf8d69288fbee4904")
            echo "base=$PARENT"        >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get last commit message
        id: commit
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "message=$MSG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run audit and send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BASE_SHA:           ${{ steps.shas.outputs.base }}
          HEAD_SHA:           ${{ steps.shas.outputs.head }}
          GITHUB_EVENT_NAME:  ${{ github.event_name }}
          GITHUB_REF_NAME:    ${{ github.ref_name }}
          GITHUB_ACTOR:       ${{ github.actor }}
          COMMIT_MESSAGE:     ${{ steps.commit.outputs.message }}
        run: python .github/scripts/audit.py
